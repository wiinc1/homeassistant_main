- id: '1696023699743'
  alias: Lights - Madelyn & Laurel Vanity Off
  description: >-
    Turns off a vanity after it has been on for 15 minutes. Only the room that
    triggered is affected (Madelyn vanity also turns off her desk).
  trigger:
    - platform: state
      entity_id:
        - switch.madelynvanitylight
        - switch.laurel_vanity
      to: 'on'
      from: 'off'
      for:
        hours: 0
        minutes: 15
        seconds: 0
  condition:
    - condition: state
      entity_id: input_boolean.automation_enabled
      state: 'on'
    - condition: template
      value_template: >
        {{ not is_state(trigger.entity_id, 'unavailable') and
           not is_state(trigger.entity_id, 'unknown') }}
  action:
    - choose:
        # Laurel: only her vanity
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'switch.laurel_vanity' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: switch.laurel_vanity
                  state: 'on'
              then:
                - service: switch.turn_off
                  target:
                    entity_id: switch.laurel_vanity
        # Madelyn: vanity + desk (desk follows Madelyn vanity only)
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'switch.madelynvanitylight' }}"
          sequence:
            - if:
                - condition: or
                  conditions:
                    - condition: state
                      entity_id: switch.madelynvanitylight
                      state: 'on'
                    - condition: state
                      entity_id: switch.madelynvanitydesk
                      state: 'on'
              then:
                - service: switch.turn_off
                  target:
                    entity_id:
                      - switch.madelynvanitylight
                      - switch.madelynvanitydesk
  # Independent rooms can time out near the same moment
  mode: parallel
  max_exceeded: silent
