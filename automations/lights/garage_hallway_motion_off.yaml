- id: '1695860913281'
  alias: Lights - Garage Hallway Motion Off
  description: >-
    Turns off garage hallway and laundry lights when the garage hallway timer
    finishes (5 minutes after the last motion-triggered start/restart).
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.garage_hallway_lights
  condition:
    - condition: state
      entity_id: input_boolean.automation_enabled
      state: 'on'
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.garage_hallway
          - light.garage_hallway_2
      data:
        transition: 1
    - service: switch.turn_off
      target:
        entity_id: switch.laundryroom
  mode: single
  max_exceeded: silent
